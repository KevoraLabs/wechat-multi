name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-14
    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4

      - name: Derive release metadata
        id: vars
        run: |
          version="${GITHUB_REF_NAME#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Build release package
        id: package
        env:
          PACKAGE_FILENAME: wechat-multi-${{ steps.vars.outputs.version }}.zip
          METADATA_FILE: ${{ runner.temp }}/package.env
        run: |
          chmod +x scripts/package-app.sh scripts/update-homebrew-cask.sh
          ./scripts/package-app.sh
          cat "$METADATA_FILE" >> "$GITHUB_OUTPUT"

      - name: Validate tag version matches app version
        run: |
          if [[ "${{ steps.package.outputs.APP_VERSION }}" != "${{ steps.vars.outputs.version }}" ]]; then
            echo "Tag version ${{ steps.vars.outputs.version }} does not match app MARKETING_VERSION ${{ steps.package.outputs.APP_VERSION }}" >&2
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: ${{ steps.package.outputs.ZIP_PATH }}
